<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>Çevrimdışı</title>
<style>
body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f9fc;font-family:"Segoe UI",Arial,sans-serif;color:#22324a}
.card{width:420px;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(20,33,61,.10);padding:32px;text-align:center}
img{width:84px;height:84px;object-fit:contain;margin-bottom:16px}
h1{margin:0 0 10px 0;font-size:24px}
p{margin:0;font-size:15px;line-height:1.6;color:#5d6c84}
.badge{display:inline-block;margin-top:18px;padding:8px 14px;border-radius:999px;background:#eef3ff;color:#3657d6;font-size:13px;font-weight:600}
</style>
</head>
<body>
<div class="card">
<img src="splash.png" alt="Plix Logo" />
<h1>İnternet bağlantısı yok</h1>
<p>Plix Portal'a erişebilmek için internet bağlantınızı kontrol edin. Bağlantı geri geldiğinde uygulama normal şekilde devam edecektir.</p>
<div class="badge">Çevrimdışı mod</div>
</div>
</body>
</html>
