name: Build EXE

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - run: npx electron-builder --win nsis --x64 --publish never

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Plix-Installer
          path: dist/*.exe
