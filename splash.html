<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>Plix</title>
<style>
body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:"Segoe UI",Arial,sans-serif;overflow:hidden}
.wrap{text-align:center;animation:fadeIn .45s ease}
img{width:140px;height:140px;object-fit:contain;margin-bottom:16px;animation:pulse 1.5s infinite}
.title{font-size:18px;font-weight:600;color:#22324a}
.sub{font-size:13px;color:#6b7a90;margin-top:6px}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%{transform:scale(1);opacity:.9}50%{transform:scale(1.05);opacity:1}100%{transform:scale(1);opacity:.9}}
</style>
</head>
<body>
<div class="wrap">
<img src="splash.png" alt="Plix Logo" />
<div class="title">Plix Yükleniyor</div>
<div class="sub">Lütfen bekleyin...</div>
</div>
</body>
</html>
